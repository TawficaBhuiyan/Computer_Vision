# =====================================================================
#  Lighter fallback: ByteTrack (no ReID). Faster, still stable on a
#  static camera thanks to the long track_buffer. Use this if BoT-SORT
#  ReID is too slow on your machine.
# =====================================================================

tracker_type: bytetrack

track_high_thresh: 0.50
track_low_thresh:  0.10
new_track_thresh:  0.60
track_buffer:      60
match_thresh:      0.80
fuse_score: true
