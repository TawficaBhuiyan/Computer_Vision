# =====================================================================
#  BoT-SORT tuned for MAXIMUM ID stability on a STATIC CCTV camera.
#  Occlusion-hardened: strong ReID + long buffer + strict new-ID gate.
#  Requires ultralytics >= 8.3.114
# =====================================================================

tracker_type: botsort

track_high_thresh: 0.45      # slightly lower -> keep partial re-detections in stage 1
track_low_thresh:  0.10      # second (recovery) association threshold
new_track_thresh:  0.75      # RAISED: a NEW id is only born on a very confident,
                             #         clearly-new detection -> stops fresh IDs on reappearance
track_buffer:      150       # RAISED: keep a lost track ~5s @30fps through long occlusion
match_thresh:      0.85      # IoU match gate (a bit looser so re-emerging boxes still match)

fuse_score: true
gmc_method: none             # static camera -> disable global motion comp

# ---- ReID (appearance) : the part that kills ID shuffling ----
proximity_thresh:  0.50      # min IoU distance for appearance to even be considered
appearance_thresh: 0.50      # RAISED from 0.25: require a STRONG appearance match.
                             #   Low value = wrong person steals ID during a cross.
with_reid: true
model: auto                  # see note below on upgrading this